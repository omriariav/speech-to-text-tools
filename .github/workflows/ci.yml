name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install tqdm
          command -v jq >/dev/null || brew install jq

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check shell syntax
        run: |
          bash -n fetch_drive_recordings.sh auto_transcribe_meet.sh auto_transcribe_worker.sh transcribe_one.sh

      - name: Lint LaunchAgent template
        run: plutil -lint com.speech-to-text-tools.drivepoll.plist.example
